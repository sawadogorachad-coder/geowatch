name: GeoWatch Agents

on:
  workflow_dispatch:
    inputs:
      profile:
        description: "Profil RSS: broad, all, verified, core"
        required: false
        default: "broad"
      send_email:
        description: "Envoyer le brief par email"
        required: false
        default: "false"
  schedule:
    - cron: "0 */3 * * *"
    - cron: "0 7 * * *"

permissions:
  contents: write

jobs:
  run-agents:
    runs-on: ubuntu-latest
    env:
      GEOWATCH_PROFILE: ${{ github.event.inputs.profile || 'broad' }}
      SEND_EMAIL: ${{ (github.event_name == 'schedule' && github.event.schedule == '0 7 * * *') || github.event.inputs.send_email == 'true' }}
      EMAIL_TO: ${{ secrets.EMAIL_TO }}
      EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
      RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
      BREVO_API_KEY: ${{ secrets.BREVO_API_KEY }}
      SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run GeoWatch agents
        run: node scripts/geowatch-agents.mjs --profile "$GEOWATCH_PROFILE"

      - name: Run analyst agent (analyses & etudes)
        run: node scripts/geowatch-analyst.mjs

      - name: Commit generated intelligence
        run: |
          git config user.name "geowatch-agent"
          git config user.email "geowatch-agent@users.noreply.github.com"
          git add data/generated
          if git diff --cached --quiet; then
            echo "No generated changes"
          else
            git commit -m "Update GeoWatch agent outputs"
            git push
          fi
